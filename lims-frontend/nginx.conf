server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy API về backend container — browser chỉ gọi cùng origin (không CORS, không phụ thuộc localhost:8060)
    location /api/ {
        proxy_pass http://lims-api:8060/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25m;
    }

    # Proxy tải file MinIO (presigned URL path-style /lims-attachments/...) — same-origin qua cổng 3060.
    # Giữ nguyên Host để chữ ký presigned (s3v4) khớp (MINIO_PUBLIC_ENDPOINT = origin này).
    location /lims-attachments/ {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        # Giữ nguyên Host KÈM PORT để chữ ký presigned s3v4 (ký theo host:port) khớp
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 25m;
    }

    # SPA fallback — mọi route trả về index.html (react-router xử lý client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache asset có hash (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
